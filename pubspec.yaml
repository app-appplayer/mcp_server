name: mcp_server
description: Dart implementation of Model Context Protocol (MCP) server. Supports protocol revisions 2024-11-05 / 2025-03-26 / 2025-06-18 / 2025-11-25 with per-version capability gating, OAuth 2.1 (RFC 9728), and stdio / SSE / Streamable HTTP transports.
version: 2.0.0
homepage: https://app-appplayer.github.io/makemind
repository: https://github.com/app-appplayer/mcp_server
issue_tracker: https://github.com/app-appplayer/mcp_server/issues

environment:
  sdk: ^3.7.0

dependencies:
  http: ^1.2.0
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  meta: ^1.15.0
  logging: ^1.2.0
  shelf: ^1.4.2

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
  mockito: ^5.4.4
  build_runner: ^2.4.12
  json_serializable: ^6.8.0
